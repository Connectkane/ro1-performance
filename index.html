<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RO-1 — Performance Systems_</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #FFFFFF;
  --bg-alt: #FAFAFB;
  --ink: #0A0A0A;
  --ink-2: #1A1A1A;
  --slate: #A1A4AE;
  --slate-2: #6E7079;
  --hair: #E6E7EB;
  --hair-2: #EFEFF2;
  --accent: #4C7CFF;
  --status: #22CC71;
  --pad: clamp(20px, 4vw, 56px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Barlow', -apple-system, system-ui, sans-serif;
  font-weight: 400;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
.mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-feature-settings: "ss01"; }
.up { text-transform: uppercase; letter-spacing: 0.08em; }
.tabular { font-variant-numeric: tabular-nums; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
hr { border: none; border-top: 1px solid var(--hair); margin: 0; }
::selection { background: var(--accent); color: #fff; }

/* Page wrapper with vertical signature gutter */
.shell { position: relative; }
.vsig {
  position: fixed;
  top: 0; bottom: 0;
  width: 32px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  z-index: 5;
}
.vsig.r { right: 0; border-left: 1px solid var(--hair); }
.vsig.l { left: 0; border-right: 1px solid var(--hair); }
.vsig span {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.34em;
  color: var(--accent);
  text-transform: uppercase;
  white-space: nowrap;
}
.vsig.l span { color: var(--slate-2); }
@media (max-width: 920px) { .vsig { display: none; } }

.page { max-width: 1240px; margin: 0 auto; padding: 0 var(--pad); }

/* ---- NAV ---- */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.92);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--hair);
}
.nav-row {
  display: flex; align-items: center; justify-content: space-between;
  height: 60px; gap: 24px;
}
.brand {
  display: flex; align-items: baseline; gap: 12px;
  font-weight: 600; font-size: 17px; letter-spacing: -0.01em;
}
.brand .tag { font-size: 9px; color: var(--slate-2); letter-spacing: 0.2em; text-transform: uppercase; font-weight: 400; }
.nav-links { display: flex; gap: 32px; font-size: 11px; color: var(--slate-2); letter-spacing: 0.12em; text-transform: uppercase; }
.nav-links a { transition: color 160ms; }
.nav-links a:hover { color: var(--ink); }
.nav-cta {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--ink); color: #fff;
  padding: 9px 16px; font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; border-radius: 2px;
  transition: background 160ms;
}
.nav-cta:hover { background: var(--accent); }
@media (max-width: 760px) { .nav-links { display: none; } }

/* ---- HERO ---- */
.hero {
  display: grid; grid-template-columns: 1fr 1fr;
  border-bottom: 1px solid var(--hair);
  min-height: 640px;
}
.hero-l { padding: 56px 56px 56px 0; border-right: 1px solid var(--hair); display: flex; flex-direction: column; justify-content: space-between; }
.hero-r { padding: 56px 0 56px 56px; position: relative; display: flex; align-items: center; justify-content: center; }
@media (max-width: 880px) {
  .hero { grid-template-columns: 1fr; }
  .hero-l { border-right: none; border-bottom: 1px solid var(--hair); padding: 40px 0; }
  .hero-r { padding: 40px 0; min-height: 520px; }
}

.hero-stack { max-width: 540px; }
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.16em;
  color: var(--slate-2); text-transform: uppercase;
  margin-bottom: 28px;
}
.hero-eyebrow .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 4px rgba(76,124,255,0.14);
}
.hero-h1 {
  font-size: clamp(54px, 6.4vw, 92px);
  font-weight: 500; letter-spacing: -0.035em; line-height: 0.96;
  margin-bottom: 26px; text-wrap: balance;
}
.hero-h1 .accent { color: var(--accent); }
.hero-lede {
  font-size: 17px; line-height: 1.55; color: var(--slate-2);
  max-width: 460px; margin-bottom: 36px; text-wrap: pretty;
}
.hero-trust {
  display: flex; flex-wrap: wrap; gap: 22px; margin-top: 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--slate-2);
}
.hero-trust span { display: flex; align-items: center; gap: 8px; }
.hero-trust .tk { color: var(--status); }

.cta-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 22px; font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; border-radius: 2px;
  transition: all 160ms ease;
  border: 1px solid transparent;
  font-weight: 500;
}
.btn-primary { background: var(--ink); color: #fff; }
.btn-primary:hover { background: var(--accent); }
.btn-secondary { background: #fff; color: var(--ink); border-color: var(--hair); }
.btn-secondary:hover { border-color: var(--ink); }
.btn .arrow { transition: transform 200ms; font-size: 14px; }
.btn:hover .arrow { transform: translateX(3px); }

/* Pillars row under hero */
.pillars {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 0; margin-top: 36px;
  padding-top: 32px; border-top: 1px solid var(--hair);
}
@media (max-width: 720px) { .pillars { grid-template-columns: 1fr 1fr; gap: 24px 16px; } }
.pillar {
  display: flex; flex-direction: column; gap: 10px;
  padding-right: 16px;
}
.pillar .ico {
  width: 28px; height: 28px;
  border: 1px solid var(--ink); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--ink);
}
.pillar .lbl { font-size: 10px; color: var(--ink); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; line-height: 1.3; }

/* Hero right - bottle */
.bottle-wrap { position: relative; width: 100%; height: 100%; min-height: 560px; display: flex; align-items: center; justify-content: center; }
.bottle-bg {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, #FAFAFB 0%, #F4F5F7 100%);
}
.bottle-wrap img {
  position: relative; z-index: 2;
  max-height: 580px; max-width: 90%;
  filter: drop-shadow(0 30px 50px rgba(10,10,10,0.10));
}

/* ---- Section base ---- */
section { border-bottom: 1px solid var(--hair); }
.sec { padding: 88px 0; }
.sec-grid {
  display: grid; grid-template-columns: 360px 1fr;
  gap: 64px; align-items: start;
}
@media (max-width: 880px) {
  .sec { padding: 56px 0; }
  .sec-grid { grid-template-columns: 1fr; gap: 32px; }
}
.sec-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--accent);
  letter-spacing: 0.08em; margin-bottom: 18px;
  display: flex; align-items: center; gap: 12px;
}
.sec-num .lbl { color: var(--slate-2); text-transform: uppercase; }
.sec-title {
  font-size: clamp(28px, 3.4vw, 40px);
  font-weight: 600; letter-spacing: -0.025em; line-height: 1.05;
  text-wrap: balance;
}
.sec-title .accent { color: var(--accent); }
.sec-lede {
  font-size: 14px; color: var(--slate-2); margin-top: 18px;
  line-height: 1.55; max-width: 320px;
}

/* ---- Science Core / Diagram ---- */
.diagram {
  position: relative;
  border: 1px solid var(--hair); border-radius: 4px;
  background: #fff;
  height: 380px;
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; padding: 24px;
}
.diagram-grid {
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(to right, var(--hair-2) 1px, transparent 1px),
    linear-gradient(to bottom, var(--hair-2) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000 50%, transparent 90%);
  -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000 50%, transparent 90%);
}
.dxlabel {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--slate-2); letter-spacing: 0.06em; text-transform: uppercase;
  position: relative; z-index: 2;
  display: flex; flex-direction: column; gap: 4px;
}
.dxlabel.l { text-align: right; }
.dxlabel .v { color: var(--ink); font-size: 13px; letter-spacing: 0.04em; }
.dxlabel .pct { color: var(--accent); }
.diagram-mid {
  position: relative; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.diagram-circle {
  width: 240px; height: 240px;
  border: 1px solid var(--hair);
  border-radius: 50%;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.diagram-circle::before, .diagram-circle::after {
  content: ""; position: absolute;
  border: 1px solid var(--hair); border-radius: 50%;
}
.diagram-circle::before { inset: 24px; }
.diagram-circle::after { inset: 56px; border-color: var(--accent); opacity: 0.4; }
.diagram-cap {
  width: 50%; height: 100%;
  position: absolute; left: 0; top: 0;
  border-right: 1px dashed var(--hair);
  display: flex; align-items: center; justify-content: center;
}
.diagram-cap.r { left: 50%; border-right: none; border-left: 1px dashed var(--hair); }
.diagram-cap .pulse {
  width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
}
.diagram-cap.r .pulse { background: var(--ink); }
.diagram-tick {
  position: absolute; font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--slate-2);
}
.diagram-tick.t1 { top: 12px; left: 50%; transform: translateX(-50%); }
.diagram-tick.t2 { bottom: 12px; left: 50%; transform: translateX(-50%); }
.diagram-tick.t3 { left: 12px; top: 50%; transform: translateY(-50%); }
.diagram-tick.t4 { right: 12px; top: 50%; transform: translateY(-50%); }
.science-points {
  display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
  margin-top: 28px;
}
@media (max-width: 720px) { .science-points { grid-template-columns: 1fr; } }
.science-point .ph {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
  font-size: 11px; color: var(--ink); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500;
}
.science-point .ph .pdot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
.science-point p { font-size: 13px; color: var(--slate-2); }

/* ---- Protocol Panel ---- */
.panel {
  border: 1px solid var(--hair);
  background: #fff;
  border-radius: 4px;
  overflow: hidden;
}
.panel-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid var(--hair);
  background: var(--bg-alt);
}
.panel-head .ttl { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); font-weight: 500; }
.panel-head .ver { font-size: 11px; color: var(--slate-2); font-family: 'JetBrains Mono', monospace; }
.kv {
  display: grid; grid-template-columns: 200px 1fr;
  border-bottom: 1px solid var(--hair-2);
  padding: 14px 20px;
  align-items: baseline;
}
.kv:last-child { border-bottom: none; }
.kv .k { font-size: 11px; color: var(--slate-2); text-transform: uppercase; letter-spacing: 0.1em; }
.kv .v { font-size: 14px; font-family: 'JetBrains Mono', monospace; }

/* ---- Composition ---- */
.comp {
  border: 1px solid var(--hair); border-radius: 4px;
  background: #fff;
  position: relative;
  overflow: hidden;
}
.comp-grid { padding: 8px 0; }
.comp-head, .comp-row {
  display: grid;
  grid-template-columns: 32px 2.4fr 1.4fr 1.2fr;
  align-items: center;
  padding: 0 24px;
}
.comp-head {
  padding-top: 14px; padding-bottom: 14px;
  border-bottom: 1px solid var(--hair);
  font-size: 11px; color: var(--slate-2); letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--bg-alt);
}
.comp-row {
  padding-top: 18px; padding-bottom: 18px;
  border-bottom: 1px solid var(--hair-2);
  cursor: pointer; transition: background 140ms;
}
.comp-row:last-child { border-bottom: none; }
.comp-row:hover { background: var(--bg-alt); }
.comp-row .idx { font-size: 11px; color: var(--slate-2); font-family: 'JetBrains Mono', monospace; }
.comp-row .ing { font-weight: 500; font-size: 16px; }
.comp-row .ing sup { font-size: 9px; color: var(--accent); margin-left: 1px; }
.comp-row .fn { font-size: 13px; color: var(--slate-2); }
.comp-row .dose { font-family: 'JetBrains Mono', monospace; font-size: 15px; text-align: right; }
.comp-detail {
  grid-column: 1 / -1; padding: 16px 0 4px;
  margin-top: 14px;
  border-top: 1px solid var(--hair-2);
  display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
  font-size: 13px; color: var(--slate-2); line-height: 1.55;
}
@media (max-width: 720px) { .comp-detail { grid-template-columns: 1fr; gap: 14px; } }
.comp-detail strong { color: var(--ink); font-weight: 500; display: block; margin-bottom: 6px; font-size: 13px; }
.comp-detail .ref { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); margin-top: 8px; }
.comp-microcopy {
  padding: 14px 24px;
  font-size: 11px; color: var(--slate-2); letter-spacing: 0.04em;
  background: var(--bg-alt);
  border-top: 1px solid var(--hair);
  display: flex; justify-content: space-between;
}

/* ---- Proof grid (icon row) ---- */
.proof-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border: 1px solid var(--hair); border-radius: 4px;
  background: #fff;
}
@media (max-width: 720px) { .proof-grid { grid-template-columns: 1fr 1fr; } }
.proof-cell {
  padding: 28px 24px;
  border-right: 1px solid var(--hair);
  border-bottom: 1px solid var(--hair);
}
.proof-cell:last-child { border-right: none; }
@media (max-width: 720px) {
  .proof-cell:nth-child(2) { border-right: none; }
  .proof-cell:nth-child(3), .proof-cell:nth-child(4) { border-bottom: none; }
}
.proof-cell .ic {
  width: 36px; height: 36px;
  border: 1px solid var(--ink); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; margin-bottom: 18px;
}
.proof-cell h5 { font-size: 13px; font-weight: 500; letter-spacing: 0.02em; margin-bottom: 8px; line-height: 1.3; }
.proof-cell p { font-size: 12px; color: var(--slate-2); line-height: 1.55; }

.refs {
  margin-top: 28px; padding: 20px 24px;
  background: var(--bg-alt); border: 1px solid var(--hair); border-radius: 4px;
}
.refs h6 { font-size: 11px; color: var(--ink); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; font-weight: 500; }
.refs ol { padding-left: 20px; font-size: 12px; color: var(--slate-2); line-height: 1.7; }
.refs li::marker { color: var(--accent); font-family: 'JetBrains Mono', monospace; }
.refs a { color: var(--accent); margin-left: 6px; }

/* ---- Mechanism (3 systems, simplified) ---- */
.mech {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
  border: 1px solid var(--hair); border-radius: 4px; overflow: hidden;
  background: #fff;
}
@media (max-width: 880px) { .mech { grid-template-columns: 1fr; } }
.mech-cell {
  padding: 28px 24px;
  border-right: 1px solid var(--hair);
}
.mech-cell:last-child { border-right: none; }
@media (max-width: 880px) {
  .mech-cell { border-right: none; border-bottom: 1px solid var(--hair); }
  .mech-cell:last-child { border-bottom: none; }
}
.mech-cell .id {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--accent); letter-spacing: 0.06em; margin-bottom: 24px;
}
.mech-cell h4 { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; margin-bottom: 10px; }
.mech-cell p { font-size: 13px; color: var(--slate-2); line-height: 1.55; }

/* ---- Differentiation ---- */
.vs {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  border: 1px solid var(--hair); border-radius: 4px; overflow: hidden;
}
@media (max-width: 720px) { .vs { grid-template-columns: 1fr; } }
.vs-col { padding: 28px; background: #fff; }
.vs-col.l { border-right: 1px solid var(--hair); }
.vs-col.r { background: var(--bg-alt); }
@media (max-width: 720px) {
  .vs-col.l { border-right: none; border-bottom: 1px solid var(--hair); }
}
.vs-col h5 {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 24px; color: var(--slate-2); font-weight: 500;
}
.vs-col h5 .badge {
  display: inline-flex; align-items: center; padding: 3px 8px;
  border-radius: 2px; font-size: 10px; letter-spacing: 0.06em;
}
.vs-col.l h5 .badge { background: var(--ink); color: #fff; }
.vs-col.r h5 .badge { background: #fff; color: var(--slate-2); border: 1px solid var(--hair); }
.vs-row {
  display: grid; grid-template-columns: 24px 1fr;
  gap: 12px; padding: 14px 0; border-top: 1px solid var(--hair-2);
  font-size: 14px; align-items: baseline;
}
.vs-row:first-of-type { border-top: none; }
.vs-row .mark { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); }
.vs-row.x .mark { color: var(--slate); }
.vs-row.x { color: var(--slate-2); }

/* ---- Deploy / final CTA ---- */
.deploy {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  border-top: 1px solid var(--hair);
}
@media (max-width: 880px) { .deploy { grid-template-columns: 1fr; } }
.deploy-l { padding: 80px 56px 80px 0; border-right: 1px solid var(--hair); }
.deploy-r { padding: 80px 0 80px 56px; position: relative; }
@media (max-width: 880px) {
  .deploy-l { padding: 48px 0; border-right: none; border-bottom: 1px solid var(--hair); }
  .deploy-r { padding: 48px 0; }
}
.deploy-l h2 {
  font-size: clamp(36px, 5vw, 60px); line-height: 1.0;
  font-weight: 600; letter-spacing: -0.03em; margin-bottom: 24px;
}
.deploy-l h2 .accent { color: var(--accent); }
.deploy-l p { font-size: 14px; color: var(--slate-2); max-width: 420px; }
.spec-row { display: flex; gap: 32px; margin-top: 32px; flex-wrap: wrap; }
.spec-row .spec { font-size: 12px; color: var(--slate-2); letter-spacing: 0.04em; }
.spec-row .spec strong { color: var(--ink); font-weight: 500; display: block; font-size: 13px; margin-bottom: 2px; }

.price-card {
  border: 1px solid var(--hair); border-radius: 4px;
  background: #fff;
  padding: 28px;
}
.price-card .ph {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--slate-2); letter-spacing: 0.1em; text-transform: uppercase;
  padding-bottom: 16px; border-bottom: 1px solid var(--hair-2); margin-bottom: 18px;
}
.price-big {
  font-size: 64px; font-weight: 600; letter-spacing: -0.04em; line-height: 1;
  margin-bottom: 4px;
}
.price-big .cents { font-size: 22px; vertical-align: top; color: var(--slate-2); margin-left: 4px; }
.price-sub { font-size: 12px; color: var(--slate-2); margin-bottom: 24px; }
.price-sub .save { color: var(--accent); }
.price-divider { height: 1px; background: var(--hair-2); margin: 18px 0; }
.deploy-meta { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 20px; font-size: 11px; color: var(--slate-2); letter-spacing: 0.04em; text-align: center; }
.deploy-meta div { padding: 10px 0; border-top: 1px solid var(--hair-2); }

/* ---- Footer ---- */
.footer-pillars {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  border-top: 1px solid var(--hair);
  border-bottom: 1px solid var(--hair);
}
@media (max-width: 720px) { .footer-pillars { grid-template-columns: 1fr 1fr; } }
.fp {
  padding: 24px;
  border-right: 1px solid var(--hair);
  display: flex; align-items: center; gap: 12px;
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500;
}
.fp:last-child { border-right: none; }
@media (max-width: 720px) {
  .fp:nth-child(2) { border-right: none; }
}

<script type="text/babel">

// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
//
// Owns the host protocol (listens for __activate_edit_mode / __deactivate_edit_mode,
// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so
// individual prototypes don't re-roll it. Ships a consistent set of controls so you
// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//
//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
//     "primaryColor": "#D97757",
//     "fontSize": 16,
//     "density": "regular",
//     "dark": false
//   }/*EDITMODE-END*/;
//
//   function App() {
//     const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
//     return (
//       <div style={{ fontSize: t.fontSize, color: t.primaryColor }}>
//         Hello
//         <TweaksPanel>
//           <TweakSection label="Typography" />
//           <TweakSlider label="Font size" value={t.fontSize} min={10} max={32} unit="px"
//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}
//                        options={['compact', 'regular', 'comfy']}
//                        onChange={(v) => setTweak('density', v)} />
//           <TweakSection label="Theme" />
//           <TweakColor  label="Primary" value={t.primaryColor}
//                        onChange={(v) => setTweak('primaryColor', v)} />
//           <TweakToggle label="Dark mode" value={t.dark}
//                        onChange={(v) => setTweak('dark', v)} />
//         </TweaksPanel>
//       </div>
//     );
//   }
//
// ─────────────────────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-body::-webkit-scrollbar{width:8px}
  .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}
  .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;
    border:2px solid transparent;background-clip:content-box}
  .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);
    border:2px solid transparent;background-clip:content-box}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;
    color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}

  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}

  .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center}

  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;
    border-radius:999px;background:rgba(0,0,0,.12);outline:none}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
    width:14px;height:14px;border-radius:50%;background:#fff;
    border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
    background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}

  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {

}

function TweakRow({ label, value, children, inline = false }) {

      </div>

}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

                  <div className="ps mono">Single deployment · no auto-renew</div>
                </div>

function Tweaks() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentHex);
    if (tweaks.density === 'compact') {
      document.documentElement.style.setProperty('--pad', 'clamp(16px, 3vw, 36px)');
    } else {
      document.documentElement.style.setProperty('--pad', 'clamp(20px, 4vw, 56px)');
    }
  }, [tweaks]);

  return (
    <TweaksPanel title="Tweaks">
      <TweakSection title="Accent">
        <TweakColor label="Module accent" value={tweaks.accentHex} onChange={v => setTweak('accentHex', v)} />
        <TweakRadio
          label="Preset"
          value={tweaks.accentHex}
          onChange={v => setTweak('accentHex', v)}
          options={[
            {label: 'Vascular', value: '#4C7CFF'},
            {label: 'Hormonal', value: '#22CC71'},
            {label: 'Sleep', value: '#FFB020'},
            {label: 'Recovery', value: '#7C40FF'}
          ]}
        />
      </TweakSection>
      <TweakSection title="Layout">
        <TweakRadio
          label="Density"
          value={tweaks.density}
          onChange={v => setTweak('density', v)}
          options={[
            {label: 'Comfort', value: 'comfortable'},
            {label: 'Compact', value: 'compact'}
          ]}
        />
      </TweakSection>
    </TweaksPanel>
  );
}
